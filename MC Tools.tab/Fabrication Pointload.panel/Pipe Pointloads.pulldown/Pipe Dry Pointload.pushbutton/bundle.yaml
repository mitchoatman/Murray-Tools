# bundle title
title:
  "Dry Pipe\nPointload"

# bundle tooltip
tooltip: |-
  *NOT WATER FILLED WEIGHTS*
  Calculates the combined weight of selected Fabrication Pipes
  and divides that weight across the selected Fabrication Hangers.
  Values are rounded to a power of 10x.
  Example: 1 = 0-10lbs  2 = 11-20lbs  3 = 21-30.lbs  4 = 31-40lbs
    1. Run Command.
    2. Select Fab Pipes & Hangers to collect and distribute weight.
    Muti-point supports weights are halved automatically.

  [Shift]+Click:
  Execute point load command that populates real weights.

# context directives are listed under `context` key, the order does not matter
#context:
#  - Selection

