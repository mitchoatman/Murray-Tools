title:
  "Line\nNumber"

tooltip: |-
  Opens a panel that allows the folling actions:
   - Writes line number value to the FP_Line Number parameter.
   - Collects a list of all line numbers in project.
   - Zoom to elements using specific line number.
   - Make view filters of line numbers.

