# highlight: new
title:
  "Pipe Bulk\nWall Opening"

tooltip: |-
  Place WS family on pipe centerline at wall locations for point layout purposes.
  It will append Fabrication service name and abbreviation to the sleeve and includes 1/2"
  annular space.
  
  1.  Select the pipe(s) to place sleeve on.
  2.  Click Finish
  3.  Pick the linked wall to place sleeves in.

  [Shift]+Click:
  Place DR-WS family on pipe centerline at wall locations for point layout purposes.
  It will also append Fabrication service name and abbreviation to the sleeve.
  
  1.  Select the pipe(s) to place sleeve on.
  2.  Click Finish
  3.  Pick the linked wall to place sleeves in.

